<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گالری هورآفرین</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- صفحه خوش‌آمدگویی -->
        <div class="card" id="welcomeCard">
            <h1>به گالری هورآفرین خوش آمدید</h1>
            <p>شمع‌های دست‌ساز و هدیه‌های خاص برای لحظات شما</p>
            <button class="btn btn-primary" id="enterBtn">ورود به سایت</button>
        </div>

        <!-- محتوای اصلی سایت (در ابتدا مخفی) -->
        <div class="card hidden" id="contentCard">
            <nav class="menu">
                <button class="menu-item active" onclick="showSection('orderBox')">ثبت سفارش</button>
                <button class="menu-item" onclick="showSection('aboutBox')">درباره ما</button>
            </nav>

            <!-- بخش ثبت سفارش و پرداخت -->
            <div class="info-box" id="orderBox">
                <h3>ثبت سفارش و پرداخت آنلاین</h3>
                <p>اطلاعات زیر را وارد کنید و روی دکمه پرداخت کلیک کنید.</p>
                
                <div class="form-grid">
                    <input type="text" id="name" placeholder="نام و نام خانوادگی">
                    <input type="tel" id="phone" placeholder="شماره تماس">
                    <input type="number" id="amount" placeholder="مبلغ سفارش (تومان)">
                    <textarea id="details" placeholder="نام محصول یا توضیحات"></textarea>
                </div>

                <button class="btn btn-primary full" id="payBtn">پرداخت آنلاین و ثبت نهایی</button>
            </div>

            <!-- بخش درباره ما -->
            <div class="info-box hidden" id="aboutBox">
                <h3>درباره ما</h3>
                <p>هورآفرین با تمرکز بر محصولات دست‌ساز، شمع‌های خاص و هدیه‌های ساده و شیک برای لحظه‌های مهم شما ساخته شده است.</p>
            </div>
        </div>
    </div>

    <script>
        const enterBtn = document.getElementById('enterBtn');
        const welcomeCard = document.getElementById('welcomeCard');
        const contentCard = document.getElementById('contentCard');

        // دکمه ورود به سایت
        enterBtn.addEventListener('click', () => {
            welcomeCard.classList.add('hidden');
            contentCard.classList.remove('hidden');
        });

        // تابع جابجایی بین منوها
        function showSection(id) {
            // مخفی کردن همه باکس‌ها
            document.querySelectorAll('.info-box').forEach(box => {
                box.classList.add('hidden');
            });
            // نمایش باکس کلیک شده
            document.getElementById(id).classList.remove('hidden');
            
            // تغییر استایل دکمه‌های منو
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        // کد مربوط به پرداخت
        const payBtn = document.getElementById('payBtn');
        payBtn.addEventListener('click', () => {
            const name = document.getElementById('name').value;
            const amount = document.getElementById('amount').value;
            const phone = document.getElementById('phone').value;

            if (!name || !amount || !phone) {
                alert("لطفاً نام، شماره تماس و مبلغ را وارد کنید.");
                return;
            }

            // فعلاً از لینک تستی استفاده شده، فردا لینک خودت را جایگزین کن
            // به جای YourID، نام کاربری زرین‌پال خودت را بگذار
            const zarinpalLink = `https://zarinp.al/YourID/${amount}`;
            
            // باز کردن درگاه پرداخت در تب جدید
            window.open(zarinpalLink, '_blank');
        });
    </script>
</body>
</html>
