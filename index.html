<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هورآفرین | گالری شمع لوکس</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    
    <style>
        /* این بخش همان CSS است که پرسیدید کجا بگذارید */
        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: var(--dark);
            color: #e0e0e0;
            direction: rtl;
            line-height: 1.6;
        }

        header {
            height: 30vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), var(--dark)), 
                        url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            border-bottom: 1px solid var(--gold);
            padding: 20px;
        }

        header h1 { color: var(--gold); font-size: 2.2rem; margin-bottom: 5px; }

        .main-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--gold); }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card-content { padding: 15px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }

        .card-title { font-size: 1.1rem; margin-bottom: 8px; color: #fff; }

        .card-price { color: var(--gold); font-weight: bold; font-size: 1.2rem; display: block; margin-bottom: 15px; }

        .btn {
            display: block;
            background: var(--gold);
            color: #000;
            padding: 10px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover { background: #fff; }

        #loading-msg { text-align: center; padding: 50px; color: var(--gold); }
    </style>
</head>
<body>

<header>
    <h1>گالری هورآفرین</h1>
    <p>روشنایی به سبک هنر دست</p>
</header>

<div class="main-container">
    <div id="loading-msg">در حال دریافت محصولات از لیست شما...</div>
    <div class="grid" id="product-grid"></div>
</div>

<script>
    // اتصال به گوگل شیت شما
    const sheetId = '155dRNylDKiraQQjhSR4kIRvi0-hpcj4ThitpcyDn16k';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

    async function loadProducts() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            
            // جدا کردن خطوط CSV
            const lines = data.split('\n');
            const grid = document.getElementById('product-grid');
            const loader = document.getElementById('loading-msg');
            
            loader.style.display = 'none';

            // شروع از ردیف دوم (ایندکس 1) برای نادیده گرفتن سرتیترها
            for (let i = 1; i < lines.length; i++) {
                const p = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (p.length >= 2) {
                    const title = p[0]?.replace(/"/g, '') || 'محصول جدید';
                    const price = p[1]?.replace(/"/g, '') || 'تماس بگیرید';
                    const img = p[2]?.replace(/"/g, '') || 'https://via.placeholder.com/300';
                    const link = p[3]?.replace(/"/g, '') || '#';
                    const desc = p[4]?.replace(/"/g, '') || '';

                    const cardHtml = `
                        <div class="card">
                            <img src="${img}" alt="${title}" onerror="this.src='https://via.placeholder.com/300?text=بدون+تصویر'">
                            <div class="card-content">
                                <div>
                                    <h2 class="card-title">${title}</h2>
                                    <p style="font-size: 0.8rem; color: #aaa; margin-bottom: 10px;">${desc}</p>
                                </div>
                                <div>
                                    <span class="card-price">${price} تومان</span>
                                    <a href="${link}" class="btn">خرید آنلاین</a>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += cardHtml;
                }
            }
        } catch (e) {
            document.getElementById('loading-msg').innerText = "خطا! لطفاً دسترسی لینک گوگل شیت را چک کنید.";
        }
    }

    loadProducts();
</script>

</body>
</html>
