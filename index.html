<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گالری هورآفرین</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="welcome-screen">
    <h1>به گالری هورآفرین خوش آمدید</h1>
    <p>شمع‌های دست‌ساز و هدیه‌های خاص برای لحظات شما</p>
    
    <button class="btn btn-primary" onclick="showOrderForm()">ثبت سفارش شمع</button>
    <a href="https://wa.me/989123456789" class="btn" style="background: #e9edc9; color: #5e503f;">مشاهده کاتالوگ در واتس‌اپ</a>
</div>

<!-- بخش فرم سفارش که در ابتدا مخفی است -->
<div class="container hidden" id="order-screen">
    <h2 style="color: #5e503f;">فرم ثبت سفارش</h2>
    <p>لطفاً جزئیات سفارش خود را وارد کنید</p>

    <div class="order-section">
        <div class="form-group">
            <label>نام و نام خانوادگی</label>
            <input type="text" id="name" placeholder="مثال: زهرا مرادی">
        </div>

        <div class="form-group">
            <label>شماره تماس</label>
            <input type="tel" id="phone" placeholder="09123456789">
        </div>

        <div class="form-group">
            <label>نوع شمع</label>
            <select id="candle-type">
                <option value="aromatic">شمع عطری</option>
                <option value="decorative">شمع تزئینی</option>
                <option value="custom">سفارش اختصاصی (طرح دلخواه)</option>
            </select>
        </div>

        <div class="form-group">
            <label>توضیحات (رنگ، سایز یا متن دلخواه)</label>
            <textarea id="details" rows="3" placeholder="مثال: رنگ صورتی مات با عطر اسطوخودوس"></textarea>
        </div>

        <div style="background: rgba(212, 163, 115, 0.1); padding: 15px; border-radius: 15px; margin-bottom: 20px;">
            <span style="font-size: 0.8rem;">مبلغ قابل پرداخت (تومانی):</span>
            <div style="font-size: 1.2rem; font-weight: bold; color: #d4a373;">250,000 تومان</div>
        </div>

        <!-- بعد از گرفتن زرین لینک، آدرس آن را در قسمت href پایین قرار دهید -->
        <a href="لینک-زرین-لینک-شما-اینجا" class="btn btn-primary">پرداخت آنلاین و ثبت نهایی</a>
        <button onclick="showWelcome()" style="background:none; border:none; color:#8d99ae; cursor:pointer; margin-top:10px;">برگشت به صفحه قبل</button>
    </div>
</div>

<script>
    function showOrderForm() {
        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('order-screen').classList.remove('hidden');
    }

    function showWelcome() {
        document.getElementById('order-screen').classList.add('hidden');
        document.getElementById('welcome-screen').classList.remove('hidden');
    }
</script>

</body>
</html>
