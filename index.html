<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گالری لوکس هورآفرین</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37; /* طلایی لوکس */
            --bg: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1603006905003-be475563bc59?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            border-bottom: 2px solid var(--primary);
        }

        h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .product-card:hover { transform: translateY(-10px); border-color: var(--primary); }

        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .product-info { padding: 20px; text-align: center; }

        .price { color: var(--primary); font-weight: bold; font-size: 1.2rem; display: block; margin: 10px 0; }

        .buy-btn {
            display: inline-block;
            background: var(--primary);
            color: black;
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
        }

        .buy-btn:hover { background: white; }

        #loading { text-align: center; font-size: 1.2rem; color: var(--primary); padding: 50px; }
    </style>
</head>
<body>

<header>
    <h1>گالری هورآفرین</h1>
    <p>تولیدکننده شمع‌های دست‌ساز و تزئینی لوکس</p>
</header>

<div id="loading">در حال بارگذاری محصولات زیبا...</div>
<div class="container" id="product-container"></div>

<script>
    // لینک گوگل شیت شما که به فرمت CSV تبدیل شده
    const sheetId = '155dRNylDKiraQQjhSR4kIRvi0-hpcj4ThitpcyDn16k';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

    async function fetchProducts() {
        try {
            const response = await fetch(url);
            const data = await response.text();
            
            // تبدیل CSV به آرایه
            const rows = data.split('\n').slice(1); // حذف ردیف اول (عنوان‌ها)
            const container = document.getElementById('product-container');
            document.getElementById('loading').style.display = 'none';

            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // جدا کردن ستون‌ها با رعایت کوتیشن
                if (cols.length >= 4) {
                    const title = cols[0].replace(/"/g, '');
                    const price = cols[1].replace(/"/g, '');
                    const image = cols[2].replace(/"/g, '');
                    const link = cols[3].replace(/"/g, '');
                    const desc = cols[4] ? cols[4].replace(/"/g, '') : '';

                    const card = `
                        <div class="product-card">
                            <img src="${image}" alt="${title}" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                            <div class="product-info">
                                <h3>${title}</h3>
                                <p style="font-size: 0.9rem; color: #ccc;">${desc}</p>
                                <span class="price">${price} تومان</span>
                                <a href="${link}" class="buy-btn">سفارش و خرید</a>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                }
            });
        } catch (error) {
            console.error('خطا در دریافت اطلاعات:', error);
            document.getElementById('loading').innerText = 'خطا در بارگذاری. لطفاً اینترنت خود را چک کنید.';
        }
    }

    fetchProducts();
</script>

</body>
</html>
