<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هورآفرین | گالری لوکس شمع</title>
    <!-- فونت زیبای وزیر -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    
    <style>
        :root {
            --choco-dark: #1f1412;     /* شکلاتی خیلی تیره برای پس‌زمینه اصلی */
            --choco-card: #2b1b17;     /* شکلاتی نرم برای کارت‌ها */
            --caramel: #c68b59;        /* کاراملی گرم برای جزئیات و قیمت */
            --cream-light: #f5e9da;    /* کرمی ملایم برای متن‌ها */
            
            /* رنگ‌های پاستیلی دکمه‌ها */
            --pastel-mint: #cfe9d6;    /* سبز پاستیلی ملایم */
            --pastel-blue: #c9dff5;    /* آبی پاستیلی ملایم */
            --pastel-pink: #f3c6cf;    /* صورتی پاستیلی ملایم */
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            font-family: 'Vazirmatn', sans-serif; 
            background: linear-gradient(180deg, var(--choco-dark), #140d0c);
            color: #fff; 
            direction: rtl; 
            min-height: 100vh;
        }
        
        /* هدر شکلاتی کاراملی */
        header { 
            padding: 40px 20px; 
            text-align: center; 
            background: linear-gradient(135deg, #2b1b17, #1f1412); 
            border-bottom: 3px solid var(--caramel); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        header h1 { 
            color: var(--caramel); 
            font-size: 2.2rem; 
            font-weight: 900;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        header p { 
            color: var(--cream-light); 
            margin-top: 8px; 
            font-size: 1rem;
            opacity: 0.9;
        }

        .main-container { 
            max-width: 1200px; 
            margin: 40px auto; 
            padding: 0 20px; 
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; 
        }

        /* کارت‌های محصول لوکس */
        .card { 
            background: var(--choco-card); 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); 
            transition: transform 0.3s ease, border-color 0.3s ease; 
            border: 1px solid rgba(198, 139, 89, 0.15); /* حاشیه کاراملی بسیار ملایم */
            display: flex;
            flex-direction: column;
        }
        .card:hover { 
            transform: translateY(-8px); 
            border-color: var(--caramel); 
        }
        .card img { 
            width: 100%; 
            height: 260px; 
            object-fit: cover; 
            border-bottom: 1px solid rgba(198, 139, 89, 0.1);
        }
        .card-content { 
            padding: 20px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        
        .card-title { 
            font-size: 1.25rem; 
            color: #fff; 
            margin-bottom: 8px; 
            font-weight: 700;
        }
        .card-desc {
            font-size: 0.85rem; 
            color: #d1c2bd; 
            margin-bottom: 15px;
            line-height: 1.6;
            flex-grow: 1;
        }
        .card-price { 
            color: var(--caramel); 
            font-weight: 800; 
            font-size: 1.4rem; 
            display: block; 
            margin-bottom: 20px; 
        }

        /* دکمه‌های ۳ گانه با استایل پاستیلی */
        .btn-group { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        .btn { 
            display: block; 
            padding: 12px; 
            border-radius: 14px; 
            text-decoration: none; 
            font-size: 0.9rem; 
            font-weight: bold; 
            transition: all 0.25s ease; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        
        /* دکمه درگاه پرداخت (سبز پاستیلی) */
        .btn-pay { 
            background: var(--pastel-mint); 
            color: #1c3a2a; 
        }
        /* دکمه روبیکا (آبی پاستیلی) */
        .btn-rubika { 
            background: var(--pastel-blue); 
            color: #1a3550; 
        }
        /* دکمه اینستاگرام (صورتی پاستیلی) */
        .btn-insta { 
            background: var(--pastel-pink); 
            color: #5a2333; 
        }

        .btn:hover { 
            transform: scale(1.03); 
            opacity: 0.95; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
        }

        #loading-msg { 
            text-align: center; 
            padding: 60px; 
            color: var(--caramel); 
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

</header>
